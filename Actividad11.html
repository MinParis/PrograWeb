<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 11 - Conversor Kilómetros a Millas</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .contenedor {
    background: white;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    width: 320px;
  }
  h2 {
    text-align: center;
    color: #333;
  }
  label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: bold;
  }
  input {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    background-color: #2a9d40;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background-color: #1f7a30;
  }
  #mensaje {
    color: red;
    font-size: 13px;
    margin-top: 5px;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="contenedor">
  <h2>Kilómetros a Millas</h2>

  <label for="km">Distancia en kilómetros:</label>
  <input type="text" id="km" placeholder="Ej. 10">
  <div id="mensaje"></div>

  <button onclick="convertir()">Convertir</button>

  <label for="millas">Distancia en millas:</label>
  <input type="text" id="millas" readonly>
</div>

<script>
  function convertir() {
    const kmInput = document.getElementById("km");
    const mensaje = document.getElementById("mensaje");
    const millasInput = document.getElementById("millas");

    const valor = kmInput.value.trim();

    if (valor === "") {
      mensaje.textContent = "El campo no puede estar vacío.";
      millasInput.value = "";
      return;
    }

    const km = Number(valor);
    if (isNaN(km)) {
      mensaje.textContent = "Ingresa un valor numérico válido.";
      millasInput.value = "";
      return;
    }

    mensaje.textContent = "";
    const millas = km * 0.621371;
    millasInput.value = millas.toFixed(5) + " mi";
  }
</script>

</body>
</html>
