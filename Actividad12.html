<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor MXN a USD</title>
    <link rel="stylesheet" href="css/Actividad12.css">
</head>

<body>

    <div class="contenedor">

        <h1>Calculadora MXN a USD</h1>

        <label for="pesos">Cantidad en Pesos Mexicanos (MXN)</label>

        <input
            type="number"
            id="pesos"
            placeholder="Ingrese la cantidad">

        <button id="convertir">
            Convertir
        </button>

        <label for="resultado">Resultado en Dólares (USD)</label>

        <input
            type="text"
            id="resultado"
            readonly>

    </div>

    <script src="script.js"></script>

</body>

</html>
