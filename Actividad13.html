<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar si puede votar</title>

    <link rel="stylesheet" href="css/Actividad13.css">
</head>

<body>

    <div class="contenedor">

        <h1>Verificador de Votación</h1>

        <label for="edad">Ingrese su edad:</label>

        <input
            type="number"
            id="edad"
            placeholder="Ingrese su edad">

        <button id="verificar">
            Verificar
        </button>

        <label for="resultado">Resultado:</label>

        <input
            type="text"
            id="resultado"
            readonly>

    </div>

    <script src="js/Actividad13.js"></script>

</body>

</html>
