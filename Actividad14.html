<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones con Arreglos</title>
    <link rel="stylesheet" href="css/Actividad14.css">
</head>

<body>

    <div class="contenedor">

        <h1>Operaciones con Arreglos</h1>

        <label for="numeros">Ingrese números separados por comas:</label>

        <input
            type="text"
            id="numeros"
            placeholder="Ejemplo: 10,20,30,40">

        <button id="calcular">
            Calcular
        </button>

        <label for="mayor">Número Mayor:</label>
        <input
            type="text"
            id="mayor"
            readonly>

        <label for="menor">Número Menor:</label>
        <input
            type="text"
            id="menor"
            readonly>

        <label for="promedio">Promedio:</label>
        <input
            type="text"
            id="promedio"
            readonly>

    </div>

    <script src="js/Actividad14.js"></script>

</body>

</html>
