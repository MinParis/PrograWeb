<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>
    <link rel="stylesheet" href="css/Actividad15.css">
</head>

<body>

    <div class="contenedor">

        <h1>Registro de Estudiantes</h1>

        <label for="nombre">Nombre del estudiante:</label>
        <input
            type="text"
            id="nombre"
            placeholder="Ingrese el nombre">

        <label for="calificacion">Calificación:</label>
        <input
            type="number"
            id="calificacion"
            placeholder="Ingrese la calificación">

        <button id="agregar">
            Agregar estudiante
        </button>

        <button id="calcular">
            Calcular
        </button>

        <label for="promedio">Promedio:</label>
        <input
            type="text"
            id="promedio"
            readonly>

        <label for="mayor">Calificación más alta:</label>
        <input
            type="text"
            id="mayor"
            readonly>

        <label for="menor">Calificación más baja:</label>
        <input
            type="text"
            id="menor"
            readonly>

    </div>

    <script src="js/Actividad15.js"></script>

</body>

</html>
