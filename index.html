    <title>Índice de Actividades</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2b2b40);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #2b2b40;
            margin-bottom: 30px;
            font-size: 28px;
        }

        ul {
            list-style: none;
        }

        li {
            margin-bottom: 12px;
        }

        a {
            display: block;
            text-decoration: none;
            color: #fff;
            background: #4a4a6a;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        a:hover {
            background: #6a6a9a;
            transform: translateX(5px);
        }
    </style>
</head>
