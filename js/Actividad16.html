<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Funciones Flecha</title>

    <link rel="stylesheet" href="css/Actividad16.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

    <div class="contenedor">

        <h1>Calculadora</h1>

        <label for="numero1">Número 1:</label>
        <input type="text" id="numero1" placeholder="Ingrese el primer número">

        <label for="numero2">Número 2:</label>
        <input type="text" id="numero2" placeholder="Ingrese el segundo número">

        <button onclick="calcularOperacion('sumar')">Sumar</button>

        <button onclick="calcularOperacion('restar')">Restar</button>

        <button onclick="calcularOperacion('multiplicar')">Multiplicar</button>

        <button onclick="calcularOperacion('dividir')">Dividir</button>

        <label for="resultado">Resultado:</label>

        <input
            type="text"
            id="resultado"
            readonly>

    </div>

    <script src="js/Actividad16.js"></script>

</body>

</html>
